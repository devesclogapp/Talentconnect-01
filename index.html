<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talent Connect</title>

    <!-- Google Fonts — Optimized: only weights used by design system (400, 500, 600) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- DM Sans (400/500/600) + Inter (400/500/600) — no 300, 700, italic -->
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
        fetchpriority="high">

    <!-- Material Symbols — weight 400 only, fill 0..1 (used in ServiceDetails & NegotiationFlow) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap"
        rel="stylesheet">

    <!-- PWA Support -->
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
    <link rel="manifest" href="/manifest.webmanifest">

    <!-- Local CSS (imports Tailwind & Fonts) -->
    <!-- Vite handles all module imports via node_modules -->
</head>

<body class="bg-app-bg text-app-text">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
